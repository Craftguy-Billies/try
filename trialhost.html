<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
<title>TrialHost — Debug Logging Panel</title>
<style>
:root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#e6edf3;--accent:#58a6ff;--warn:#d29922;--err:#f85149;--ok:#3fb950;--dim:#8b949e;--hover:#1c2129}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,monospace;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh;overflow:hidden}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:600;white-space:nowrap}
.controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
button,input,select{font-family:inherit;font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);cursor:pointer;transition:background .15s}
button:hover{background:var(--hover)}
button:active{transform:scale(.97)}
.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.primary:hover{background:#79c0ff}
.danger{background:var(--err);color:#fff;border-color:var(--err);font-weight:600}
.danger:hover{background:#ff6b6b}
#filter{width:160px}
.stats{display:flex;gap:10px;font-size:11px;color:var(--dim)}
.stats span{white-space:nowrap}
.stats b{color:var(--text)}

main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#log-container{flex:1;overflow-y:auto;padding:4px 0;font-family:'SF Mono',Fira Code,Consolas,monospace;font-size:12px;line-height:1.6}
.log-entry{display:flex;gap:6px;padding:2px 12px;border-bottom:1px solid transparent;transition:background .1s;cursor:default;align-items:flex-start}
.log-entry:hover{background:var(--hover);border-bottom-color:var(--border)}
.log-time{color:var(--dim);white-space:nowrap;min-width:85px;flex-shrink:0;user-select:none}
.log-type{white-space:nowrap;min-width:80px;flex-shrink:0;font-weight:600;user-select:none}
.log-type.info{color:var(--accent)}
.log-type.warn{color:var(--warn)}
.log-type.error{color:var(--err)}
.log-type.ok{color:var(--ok)}
.log-type.perf{color:#a371f7}
.log-type.net{color:#79c0ff}
.log-type.user{color:#ffa657}
.log-type.session{color:#56d364}
.log-type.sensor{color:#e27cff}
.log-detail{word-break:break-all;flex:1;opacity:.9}

.quickbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;border-top:1px solid var(--border);background:var(--panel)}
.event-tester{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;border-top:1px solid var(--border);background:var(--panel)}
.event-tester summary{font-size:12px;color:var(--dim);cursor:pointer;padding:2px 0}
.event-tester summary:hover{color:var(--text)}
.event-tester .row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.event-tester button{font-size:11px;padding:4px 8px}

.conn-status{display:inline-flex;align-items:center;gap:4px;font-size:11px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
.conn-dot.off{background:var(--err);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* mobile touch */
@media (max-width:600px){
  .controls{flex-wrap:wrap}
  #filter{width:100px}
  .log-time{min-width:65px;font-size:10px}
  .log-type{min-width:60px;font-size:10px}
  .log-detail{font-size:10px}
  header h1{font-size:14px}
  .event-tester button{font-size:10px;padding:6px 10px}
}

/* Demo area */
.demo-area{margin:12px;padding:16px;background:var(--panel);border:1px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;gap:10px;max-width:500px}
.demo-area h3{font-size:14px;color:var(--dim)}
.demo-area input,.demo-area select{padding:8px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:14px}
.demo-area .drag-zone{height:60px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;user-select:none}
</style>
</head>
<body>

<header>
  <h1>🔍 TrialHost Debug Panel <span id="session-id" style="font-size:10px;color:var(--dim);font-weight:400"></span></h1>
  <div class="controls">
    <span class="conn-status"><span class="conn-dot" id="conn-dot"></span><span id="conn-label">online</span></span>
    <input id="filter" type="text" placeholder="Filter logs…" autocomplete="off">
    <button id="btn-pause" title="Pause/unpause log scrolling">⏯ Pause</button>
    <button id="btn-clear">🗑 Clear</button>
    <button id="btn-export">📥 Export</button>
    <button class="danger" id="btn-reset">↺ Reset</button>
  </div>
  <div class="stats">
    <span>Total: <b id="stat-total">0</b></span>
    <span>Err: <b id="stat-err">0</b></span>
    <span>Warn: <b id="stat-warn">0</b></span>
  </div>
</header>

<main>
  <div id="demo-area-wrapper" style="overflow-y:auto;flex-shrink:0;max-height:200px">
    <div class="demo-area">
      <h3>🧪 Interaction Test Zone (all events logged below)</h3>
      <input type="text" id="demo-input" placeholder="Type here to see key events…">
      <input type="text" id="demo-input2" placeholder="Focus/blur test…">
      <select id="demo-select"><option>Option A</option><option>Option B</option><option>Option C</option></select>
      <div class="drag-zone" id="drag-zone">🖱 Drag files here or click</div>
      <button id="demo-btn" class="primary">Click Me</button>
      <button id="demo-dbl-btn">Double-Click Me</button>
      <button id="demo-err-btn" class="danger">Trigger Error</button>
      <button id="demo-fetch-btn">Test Fetch</button>
      <button id="demo-localstore-btn">Test localStorage</button>
      <input type="file" id="demo-file" style="font-size:12px">
      <input type="color" id="demo-color" value="#58a6ff">
      <input type="range" id="demo-range" min="0" max="100" value="50">
    </div>
  </div>
  <div id="log-container"></div>
</main>

<details class="event-tester">
  <summary>⚡ Quick Event Fire Buttons</summary>
  <div class="row">
    <button data-fire="click">Click</button>
    <button data-fire="dblclick">DblClick</button>
    <button data-fire="mousedown">MouseDown</button>
    <button data-fire="mouseup">MouseUp</button>
    <button data-fire="keydown-a">KeyDown 'a'</button>
    <button data-fire="keyup-a">KeyUp 'a'</button>
    <button data-fire="focus-trigger">Focus Trigger</button>
    <button data-fire="blur-trigger">Blur Trigger</button>
    <button data-fire="scroll-trigger">Scroll</button>
    <button data-fire="resize-trigger">Resize Note</button>
    <button data-fire="network-fast">Quick Fetch</button>
    <button data-fire="network-slow">Slow Fetch</button>
    <button data-fire="network-404">404 Request</button>
    <button data-fire="network-error">Network Error</button>
    <button data-fire="storage-set">Set Storage</button>
    <button data-fire="storage-get">Get Storage</button>
    <button data-fire="storage-remove">Remove Storage</button>
    <button data-fire="rejection">Unhandled Rejection</button>
    <button data-fire="animation">Trigger Animation</button>
    <button data-fire="transition">Trigger Transition</button>
    <button data-fire="fullscreen">Toggle Fullscreen</button>
    <button data-fire="clipboard-copy">Copy Test</button>
    <button data-fire="selection">Select Text</button>
    <button data-fire="pointer-lock">Pointer Lock</button>
  </div>
</details>

<div class="quickbar">
  <button id="btn-autoscroll" class="primary" style="font-size:11px">📌 Auto-scroll ON</button>
  <span style="font-size:10px;color:var(--dim)">Log limit: <b id="log-limit-label">5000</b></span>
  <button id="btn-limit-1000" style="font-size:10px">Limit 1k</button>
  <button id="btn-limit-5000" style="font-size:10px">Limit 5k</button>
  <button id="btn-limit-nolimit" style="font-size:10px">No Limit</button>
</div>

<script>
// ============ TRIALHOST — PRODUCTION DEBUG LOGGING ENGINE ============

(function(){
'use strict';

// ---- Configuration ----
const CFG = {
  maxLogs: 5000,
  autoScroll: true,
  paused: false,
  filter: '',
  sessionId: 'TH_' + Date.now().toString(36).toUpperCase() + '_' + Math.random().toString(36).slice(2, 7).toUpperCase(),
  sessionStart: Date.now(),
  consoleIntercept: true,
  networkIntercept: true,
  sensorThrottle: 300,
  motionThrottle: 500,
  scrollThrottle: 200,
  resizeThrottle: 300,
  mouseThrottle: 100,
  touchThrottle: 100,
};

// ---- State ----
const STATE = {
  logs: [],
  stats: { total:0, error:0, warn:0 },
  lastSensorLog: 0,
  lastMotionLog: 0,
  lastScrollLog: 0,
  lastResizeLog: 0,
  lastMouseMoveLog: 0,
  lastTouchMoveLog: 0,
  _rafPending: false,
  _renderTimeout: null,
  pointerLocked: false,
  fullscreen: false,
  visibilityHidden: false,
  online: navigator.onLine,
  userAgent: navigator.userAgent,
  platform: navigator.platform,
  language: navigator.language,
  cookieEnabled: navigator.cookieEnabled,
  hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
  maxTouchPoints: navigator.maxTouchPoints || 0,
  deviceMemory: navigator.deviceMemory || 'unknown',
  connectionType: null,
  connectionDownlink: null,
  connectionRtt: null,
  screenW: screen.width,
  screenH: screen.height,
  innerW: window.innerWidth,
  innerH: window.innerHeight,
  dpr: window.devicePixelRatio,
};

if (navigator.connection) {
  STATE.connectionType = navigator.connection.effectiveType;
  STATE.connectionDownlink = navigator.connection.downlink;
  STATE.connectionRtt = navigator.connection.rtt;
}

// ---- DOM Refs ----
const $ = (s)=>document.querySelector(s);
const $$ = (s)=>document.querySelectorAll(s);
const logContainer = $('#log-container');
const filterInput = $('#filter');
const sessionIdEl = $('#session-id');
const connDot = $('#conn-dot');
const connLabel = $('#conn-label');

// ---- Log Types & Colors ----
const LOG_LEVELS = {
  info:  { cls:'info',  label:'INFO' },
  warn:  { cls:'warn',  label:'WARN' },
  error: { cls:'error', label:'ERROR' },
  ok:    { cls:'ok',    label:'OK' },
  perf:  { cls:'perf',  label:'PERF' },
  net:   { cls:'net',   label:'NET' },
  user:  { cls:'user',  label:'USER' },
  session:{ cls:'session',label:'SESSION' },
  sensor:{ cls:'sensor',label:'SENSOR' },
};

// ---- Core Log Function ----
function log(level, detail, extra) {
  const meta = LOG_LEVELS[level] || LOG_LEVELS.info;
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const ms = String(now.getMilliseconds()).padStart(3,'0');
  const timeStr = `${h}:${m}:${s}.${ms}`;
  
  const entry = {
    id: CFG.sessionId + '_' + STATE.stats.total,
    time: timeStr,
    timestamp: now.getTime(),
    level: level,
    type: meta.label,
    cls: meta.cls,
    detail: typeof detail === 'string' ? detail : JSON.stringify(detail),
    extra: extra || null,
  };

  STATE.logs.push(entry);
  STATE.stats.total++;
  if (level === 'error') STATE.stats.error++;
  if (level === 'warn') STATE.stats.warn++;

  // Enforce max log limit
  while (STATE.logs.length > CFG.maxLogs) {
    const removed = STATE.logs.shift();
    if (removed.level === 'error') STATE.stats.error = Math.max(0, STATE.stats.error - 1);
    if (removed.level === 'warn') STATE.stats.warn = Math.max(0, STATE.stats.warn - 1);
  }

  scheduleRender();
}

// ---- Throttled Log Helpers ----
function logThrottled(key, lastKey, throttleMs, level, detailFn) {
  const now = Date.now();
  if (now - STATE[lastKey] > throttleMs) {
    STATE[lastKey] = now;
    log(level, detailFn());
  }
}

// ---- Render ----
function scheduleRender() {
  if (STATE._renderTimeout) return;
  STATE._renderTimeout = requestAnimationFrame(() => {
    STATE._renderTimeout = null;
    renderLogs();
  });
}

function renderLogs() {
  const filter = CFG.filter.toLowerCase();
  let filtered = STATE.logs;
  if (filter) {
    filtered = STATE.logs.filter(e =>
      e.detail.toLowerCase().includes(filter) ||
      e.type.toLowerCase().includes(filter) ||
      e.level.toLowerCase().includes(filter)
    );
  }

  // Virtual render: only show last 500 entries in DOM
  const MAX_DOM = 500;
  const slice = filtered.length > MAX_DOM ? filtered.slice(-MAX_DOM) : filtered;
  const wasAtBottom = logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < 40;

  // Build fragment
  const frag = document.createDocumentFragment();
  for (const e of slice) {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.dataset.id = e.id;
    div.innerHTML =
      `<span class="log-time">${e.time}</span>` +
      `<span class="log-type ${e.cls}">[${e.type}]</span>` +
      `<span class="log-detail">${escHtml(e.detail)}</span>`;
    frag.appendChild(div);
  }

  logContainer.innerHTML = '';
  logContainer.appendChild(frag);

  // Show overflow indicator
  if (filtered.length > MAX_DOM) {
    const indicator = document.createElement('div');
    indicator.className = 'log-entry';
    indicator.style.color = 'var(--dim)';
    indicator.style.fontStyle = 'italic';
    indicator.innerHTML = `<span class="log-time">…</span><span class="log-type">—</span><span class="log-detail">${filtered.length - MAX_DOM} older entries hidden (DOM limit). Use Export to see all.</span>`;
    logContainer.insertBefore(indicator, logContainer.firstChild);
  }

  if (CFG.autoScroll && wasAtBottom) {
    logContainer.scrollTop = logContainer.scrollHeight;
  }

  // Update stats
  $('#stat-total').textContent = STATE.stats.total;
  $('#stat-err').textContent = STATE.stats.error;
  $('#stat-warn').textContent = STATE.stats.warn;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Export ----
function exportLogs() {
  const data = STATE.logs.map(e =>
    `[${e.time}] [${e.type}] ${e.detail}`
  ).join('\n');
  const blob = new Blob([`TrialHost Debug Log — Session ${CFG.sessionId}\n` +
    `Started: ${new Date(CFG.sessionStart).toISOString()}\n` +
    `User-Agent: ${STATE.userAgent}\n` +
    `Platform: ${STATE.platform} | Language: ${STATE.language} | Online: ${STATE.online}\n` +
    `Screen: ${STATE.screenW}x${STATE.screenH} | Viewport: ${STATE.innerW}x${STATE.innerH} | DPR: ${STATE.dpr}\n` +
    `CPU Cores: ${STATE.hardwareConcurrency} | Memory: ${STATE.deviceMemory}GB | Touch Points: ${STATE.maxTouchPoints}\n` +
    `Connection: ${STATE.connectionType || 'N/A'} | Downlink: ${STATE.connectionDownlink || 'N/A'}Mbps | RTT: ${STATE.connectionRtt || 'N/A'}ms\n` +
    `Total Logs: ${STATE.stats.total} | Errors: ${STATE.stats.error} | Warnings: ${STATE.stats.warn}\n` +
    `${'='.repeat(80)}\n\n`, ...STATE.logs.map(e =>
    `[${e.time}] [${e.type}] ${e.detail}`
  )].join('\n'), { type: 'text/plain;charset=utf-8' });

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `trialhost-debug-${CFG.sessionId}.log`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  log('ok', 'Log exported to file');
}

function clearLogs() {
  STATE.logs = [];
  STATE.stats = { total:0, error:0, warn:0 };
  logContainer.innerHTML = '<div class="log-entry"><span class="log-time">—</span><span class="log-type ok">[OK]</span><span class="log-detail">Logs cleared</span></div>';
  renderLogs();
}

function resetSession() {
  CFG.sessionId = 'TH_' + Date.now().toString(36).toUpperCase() + '_' + Math.random().toString(36).slice(2, 7).toUpperCase();
  CFG.sessionStart = Date.now();
  sessionIdEl.textContent = '#' + CFG.sessionId;
  clearLogs();
  log('session', `New session started: ${CFG.sessionId}`);
  log('session', `UA: ${STATE.userAgent}`);
  log('session', `Platform: ${STATE.platform} | Lang: ${STATE.language} | Online: ${STATE.online}`);
  log('session', `Screen: ${STATE.screenW}x${STATE.screenH} | Viewport: ${STATE.innerW}x${STATE.innerH} | DPR: ${STATE.dpr}`);
  log('session', `CPU cores: ${STATE.hardwareConcurrency} | Device Memory: ${STATE.deviceMemory}GB | Touch Points: ${STATE.maxTouchPoints}`);
  if (STATE.connectionType) log('session', `Connection: ${STATE.connectionType} | Downlink: ${STATE.connectionDownlink}Mbps | RTT: ${STATE.connectionRtt}ms`);
  log('ok', 'Session reset complete');
}

// ===================================================================
// EVENT REGISTRATION — CATCH-ALL, NO MISSING CASES
// ===================================================================

// ---- 1. Window / Document Lifecycle Events ----
window.addEventListener('DOMContentLoaded', () => log('session', 'DOMContentLoaded fired'), { once:true });
window.addEventListener('load', () => {
  log('session', 'Window load complete');
  log('perf', `Page load time: ${Math.round(performance.now())}ms`);
});
window.addEventListener('beforeunload', (e) => {
  log('session', 'beforeunload — user may be leaving the page');
});
window.addEventListener('unload', () => {
  // Use sendBeacon if we want to persist
  if (navigator.sendBeacon) {
    const data = JSON.stringify({ session:CFG.sessionId, logs:STATE.stats.total, time:Date.now() });
    navigator.sendBeacon('/_unload_beacon', data);
  }
});
window.addEventListener('pagehide', (e) => log('session', `pagehide — persisted: ${e.persisted}`));
window.addEventListener('pageshow', (e) => log('session', `pageshow — persisted: ${e.persisted}`));
window.addEventListener('readystatechange', () => log('session', `readyState: ${document.readyState}`));

// ---- 2. Visibility Change ----
document.addEventListener('visibilitychange', () => {
  STATE.visibilityHidden = document.hidden;
  log('session', `Visibility: ${document.hidden ? 'HIDDEN (tab inactive)' : 'VISIBLE (tab active)'}`);
});

// ---- 3. Online / Offline ----
window.addEventListener('online', () => {
  STATE.online = true;
  connDot.classList.remove('off');
  connLabel.textContent = 'online';
  log('session', 'Network: ONLINE — connection restored');
});
window.addEventListener('offline', () => {
  STATE.online = false;
  connDot.classList.add('off');
  connLabel.textContent = 'offline';
  log('warn', 'Network: OFFLINE — no connection available');
});

// ---- 4. Error Handling ----
window.addEventListener('error', (e) => {
  let detail = `Error: ${e.message || 'unknown'}`;
  if (e.filename) detail += ` | File: ${e.filename}:${e.lineno}:${e.colno}`;
  if (e.error && e.error.stack) detail += ` | Stack: ${e.error.stack.slice(0, 200)}`;
  log('error', detail, { message:e.message, filename:e.filename, lineno:e.lineno, colno:e.colno });
}, true); // capturing phase

window.addEventListener('unhandledrejection', (e) => {
  const reason = e.reason instanceof Error ? e.reason.message : String(e.reason);
  log('error', `Unhandled Promise Rejection: ${reason}`, { reason: String(e.reason) });
});

// Security policy violations
document.addEventListener('securitypolicyviolation', (e) => {
  log('error', `CSP Violation: ${e.violatedDirective} — ${e.blockedURI}`, {
    directive: e.violatedDirective,
    blockedURI: e.blockedURI,
    sourceFile: e.sourceFile,
    lineNumber: e.lineNumber,
  });
});

// ---- 5. Console Interception ----
if (CFG.consoleIntercept) {
  const _console = {};
  ['log','warn','error','info','debug','trace'].forEach(method => {
    _console[method] = console[method].bind(console);
    console[method] = function(...args) {
      _console[method](...args);
      const msg = args.map(a => {
        if (a instanceof Error) return a.message;
        if (typeof a === 'object') try { return JSON.stringify(a).slice(0, 200); } catch(_) { return '[Object]'; }
        return String(a).slice(0, 300);
      }).join(' ');
      const level = method === 'error' ? 'error' : method === 'warn' ? 'warn' : 'info';
      log(level, `console.${method}: ${msg}`);
    };
  });
}

// ---- 6. Network Interception (Fetch + XHR) ----
if (CFG.networkIntercept) {
  // Fetch interception
  const _fetch = window.fetch;
  window.fetch = function(url, options={}) {
    const startTime = performance.now();
    const method = options.method || 'GET';
    const urlStr = typeof url === 'string' ? url : (url.url || url.toString());
    log('net', `Fetch ▶ ${method} ${urlStr.slice(0, 150)}`, { method, url:urlStr });

    return _fetch.call(window, url, options).then(response => {
      const duration = Math.round(performance.now() - startTime);
      const cloned = response.clone();
      const status = response.status;
      const level = status >= 400 ? 'error' : status >= 300 ? 'warn' : 'net';
      log(level, `Fetch ◀ ${status} ${response.statusText} — ${duration}ms — ${method} ${urlStr.slice(0, 100)}`, { status, duration, method, url:urlStr });

      // Try to read body length
      cloned.text().then(t => {
        if (t.length > 0) log('net', `Fetch body: ${t.length} chars from ${urlStr.slice(0, 80)}`);
      }).catch(()=>{});

      return response;
    }).catch(err => {
      const duration = Math.round(performance.now() - startTime);
      log('error', `Fetch ✕ FAILED — ${duration}ms — ${method} ${urlStr.slice(0, 100)} — ${err.message}`, { method, url:urlStr, error:err.message, duration });
      throw err;
    });
  };

  // XHR interception
  const _xhrOpen = XMLHttpRequest.prototype.open;
  const _xhrSend = XMLHttpRequest.prototype.send;
  XMLHttpRequest.prototype.open = function(method, url, ...rest) {
    this._th_method = method;
    this._th_url = url;
    this._th_startTime = performance.now();
    return _xhrOpen.call(this, method, url, ...rest);
  };
  XMLHttpRequest.prototype.send = function(...args) {
    log('net', `XHR ▶ ${this._th_method} ${String(this._th_url).slice(0, 150)}`);
    this.addEventListener('loadend', function() {
      const duration = Math.round(performance.now() - this._th_startTime);
      const level = this.status >= 400 ? 'error' : this.status >= 300 ? 'warn' : 'net';
      log(level, `XHR ◀ ${this.status} ${this.statusText} — ${duration}ms — ${this._th_method} ${String(this._th_url).slice(0, 100)}`, { status:this.status, duration, method:this._th_method, url:this._th_url });
    });
    this.addEventListener('error', function() {
      const duration = Math.round(performance.now() - this._th_startTime);
      log('error', `XHR ✕ NETWORK ERROR — ${duration}ms — ${this._th_method} ${String(this._th_url).slice(0, 100)}`);
    });
    this.addEventListener('abort', function() {
      log('warn', `XHR ⚠ ABORTED — ${this._th_method} ${String(this._th_url).slice(0, 100)}`);
    });
    this.addEventListener('timeout', function() {
      log('warn', `XHR ⏱ TIMEOUT — ${this._th_method} ${String(this._th_url).slice(0, 100)}`);
    });
    return _xhrSend.call(this, ...args);
  };
}

// ---- 7. Performance Observer (Long Tasks, Paint, Layout Shift) ----
if (window.PerformanceObserver) {
  try {
    // Long tasks
    new PerformanceObserver((list) => {
      for (const entry of list.getEntries()) {
        if (entry.duration > 50) {
          log('perf', `Long Task: ${Math.round(entry.duration)}ms | Start: ${entry.startTime.toFixed(1)}`, { duration:entry.duration, startTime:entry.startTime, name:entry.name });
        }
      }
    }).observe({ type: 'longtask', buffered: true });

    // Paint timing
    new PerformanceObserver((list) => {
      for (const entry of list.getEntries()) {
        log('perf', `Paint: ${entry.name} at ${entry.startTime.toFixed(1)}ms`);
      }
    }).observe({ type: 'paint', buffered: true });

    // Layout shifts
    new PerformanceObserver((list) => {
      for (const entry of list.getEntries()) {
        if (entry.value > 0.01) {
          log('perf', `Layout Shift: value=${entry.value.toFixed(4)}`);
        }
      }
    }).observe({ type: 'layout-shift', buffered: true });

    // Largest Contentful Paint
    new PerformanceObserver((list) => {
      const entries = list.getEntries();
      const last = entries[entries.length - 1];
      if (last) log('perf', `LCP (Largest Contentful Paint): ${last.startTime.toFixed(1)}ms | element: ${last.element?.tagName || 'unknown'}`);
    }).observe({ type: 'largest-contentful-paint', buffered: true });

    // First Input Delay
    new PerformanceObserver((list) => {
      for (const entry of list.getEntries()) {
        log('perf', `First Input: delay=${entry.processingStart - entry.startTime}ms | type: ${entry.name}`);
      }
    }).observe({ type: 'first-input', buffered: true });

    // Resource timing
    new PerformanceObserver((list) => {
      for (const entry of list.getEntries()) {
        if (entry.duration > 100) {
          log('perf', `Resource: ${entry.name.slice(0, 100)} — ${Math.round(entry.duration)}ms`, { name:entry.name, duration:entry.duration, initiatorType:entry.initiatorType });
        }
      }
    }).observe({ type: 'resource', buffered: true });

  } catch(e) { log('warn', `PerformanceObserver setup error: ${e.message}`); }
}

  const prev = localStorage.getItem(key);
  localStorage.setItem(key, Date.now().toString());
  log('user', `localStorage cycle: prev="${prev||'(none)'}" → new="${localStorage.getItem(key)}"`);
});

// ---- Drag Zone ----
const dragZone = $('#drag-zone');
if (dragZone) {
  dragZone.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = () => { if(input.files[0]) log('user', `File selected via click: "${input.files[0].name}" (${input.files[0].size}B)`); };
    input.click();
  });
}

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'e') {
    e.preventDefault(); exportLogs();
  }
  if (e.ctrlKey && e.key === 'k') {
    e.preventDefault(); clearLogs();
  }
  if (e.ctrlKey && e.key === 'l') {
    e.preventDefault(); filterInput.focus(); filterInput.select();
  }
});

// ===================================================================
// INITIALIZATION
// ===================================================================
sessionIdEl.textContent = '#' + CFG.sessionId;
$('#stat-total').textContent = '0';
$('#stat-err').textContent = '0';
$('#stat-warn').textContent = '0';

// Log initial session info
log('session', `Session started: ${CFG.sessionId}`);
log('session', `Timestamp: ${new Date().toISOString()}`);
log('session', `URL: ${location.href}`);
log('session', `Referrer: ${document.referrer || '(none)'}`);
log('session', `UA: ${STATE.userAgent}`);
log('session', `Platform: ${STATE.platform} | Language: ${STATE.language} | Online: ${STATE.online} | Cookie: ${STATE.cookieEnabled}`);
log('session', `Screen: ${STATE.screenW}x${STATE.screenH} (avail: ${screen.availWidth}x${screen.availHeight}) | Viewport: ${STATE.innerW}x${STATE.innerH} | DPR: ${STATE.dpr}`);
log('session', `CPU Cores: ${STATE.hardwareConcurrency} | Device Memory: ${STATE.deviceMemory}GB | Max Touch: ${STATE.maxTouchPoints}`);
if (STATE.connectionType) log('session', `Connection: ${STATE.connectionType} | Downlink: ${STATE.connectionDownlink}Mbps | RTT: ${STATE.connectionRtt}ms | saveData: ${navigator.connection?.saveData || false}`);
log('session', `TimeZone: ${Intl.DateTimeFormat().resolvedOptions().timeZone} | Locale: ${Intl.DateTimeFormat().resolvedOptions().locale}`);
log('session', `Do Not Track: ${navigator.doNotTrack || 'unspecified'} | PDF Viewer: ${navigator.pdfViewerEnabled ?? 'unknown'} | WebDriver: ${navigator.webdriver}`);
log('session', `Permissions API: ${!!navigator.permissions} | ServiceWorker: ${!!navigator.serviceWorker} | SharedWorker: ${!!window.SharedWorker}`);
log('session', `WebSocket: ${!!window.WebSocket} | WebRTC: ${!!window.RTCPeerConnection} | WebGL: ${(function(){try{var c=document.createElement('canvas');return!!(c.getContext('webgl')||c.getContext('experimental-webgl'));}catch(e){return false;}})()}`);
log('ok', 'TrialHost debug engine initialized — watching all events');

// After DOM is fully ready
if (document.readyState === 'complete') {
  log('session', 'Document already complete at init time');
} else {
  log('session', `Document readyState at init: ${document.readyState}`);
}

// Periodic heartbeat
setInterval(() => {
  const uptime = Math.round((Date.now() - CFG.sessionStart) / 1000);
  log('perf', `♥ Heartbeat — session uptime: ${uptime}s | logs: ${STATE.stats.total} | memory: ${performance.memory ? Math.round(performance.memory.usedJSHeapSize/1048576)+'MB' : 'N/A'}`);
}, 60000);

// Log when page becomes idle
if ('requestIdleCallback' in window) {
  requestIdleCallback(() => {
    log('perf', 'Page reached idle state');
  });
}

})();
</script>
</body>
</html>
